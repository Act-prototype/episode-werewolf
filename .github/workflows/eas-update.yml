name: EAS Update

# main への push（PRマージ含む）ごとに OTA 更新を自動配信する。
# Expo Go では「最近開いた」から再度開くだけで最新が反映される。
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish update
        # GitHub Actions は CI=true のため eas は自動的に非対話で動作する。
        # メッセージはコミットSHA（常に非空・安全。'#' を含めると YAML コメント扱いになり壊れる点に注意）。
        run: eas update --branch main --message "${{ github.sha }}"
